<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra | AI 電商行銷設計師作品集</title>
    <meta name="description" content="AI 驅動的電商品牌視覺與行銷設計提案展示系統">
    
    <!-- Google Fonts: Inter and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="pinterest-theme">
    <!-- Pinterest Style Header -->
    <header class="pin-header">
        <div class="logo-group">
            <div class="logo">U</div>
            <nav class="main-nav">
                <a href="#" class="active">首頁</a>
                <a href="#">建立</a>
            </nav>
        </div>
        
        <div class="search-container">
            <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" placeholder="搜尋行銷素材、頁面設計、品牌概念..." id="search-input">
        </div>
        
        <div class="icon-group">
            <span class="material-symbols-outlined">notifications</span>
            <span class="material-symbols-outlined">chat</span>
            <div class="profile-avatar">M</div>
            <span class="material-symbols-outlined">expand_more</span>
        </div>
    </header>

    <!-- Sub-navigation / Tags -->
    <div class="sub-nav">
        <div class="tags-container">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="ad-creatives">廣告素材</button>
            <button class="filter-btn" data-filter="marketing-visuals">行銷視覺</button>
            <button class="filter-btn" data-filter="landing-pages">網頁設計</button>
            <button class="filter-btn" data-filter="branding">品牌概念</button>
            <button class="filter-btn" data-filter="social-media">社群行銷</button>
        </div>
    </div>

    <!-- Main Grid -->
    <main class="main-content">
        <div id="masonry-grid" class="masonry-grid">
            <!-- Using Unsplash for guaranteed display in this environment -->
            <div class="grid-item" data-category="ad-creatives">
                <img src="https://images.unsplash.com/photo-1556228720-195a672e8a03?auto=format&fit=crop&q=80&w=800" alt="Luxury Skincare" loading="lazy">
                <div class="item-overlay">
                    <button class="save-btn">儲存</button>
                </div>
            </div>
            <div class="grid-item" data-category="landing-pages">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&q=80&w=800" alt="Tech Gadget" loading="lazy">
                <div class="item-overlay"><button class="save-btn">儲存</button></div>
            </div>
            <div class="grid-item" data-category="social-media">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=800" alt="Minimalist Watch" loading="lazy">
                <div class="item-overlay"><button class="save-btn">儲存</button></div>
            </div>
            <div class="grid-item" data-category="branding">
                <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&q=80&w=800" alt="Living Room Design" loading="lazy">
                <div class="item-overlay"><button class="save-btn">儲存</button></div>
            </div>
            <div class="grid-item" data-category="marketing-visuals">
                <img src="https://images.unsplash.com/photo-1559056199-641a0ac8b55e?auto=format&fit=crop&q=80&w=800" alt="Coffee Aesthetic" loading="lazy">
                <div class="item-overlay"><button class="save-btn">儲存</button></div>
            </div>
            <div class="grid-item" data-category="landing-pages">
                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=800" alt="SaaS UI" loading="lazy">
                <div class="item-overlay"><button class="save-btn">儲存</button></div>
            </div>
             <div class="grid-item" data-category="marketing-visuals">
                <img src="https://images.unsplash.com/photo-1515562141207-7a88fb0ce33e?auto=format&fit=crop&q=80&w=800" alt="Luxury Jewelry" loading="lazy">
                <div class="item-overlay"><button class="save-btn">儲存</button></div>
            </div>
            <div class="grid-item" data-category="ad-creatives">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&q=80&w=800" alt="Sports Shoes" loading="lazy">
                <div class="item-overlay"><button class="save-btn">儲存</button></div>
            </div>
            <div class="grid-item" data-category="marketing-visuals">
                <img src="https://images.unsplash.com/photo-1616489953149-75517454f8a9?auto=format&fit=crop&q=80&w=800" alt="Luxury Interior" loading="lazy">
                <div class="item-overlay"><button class="save-btn">儲存</button></div>
            </div>
            <div class="grid-item" data-category="social-media">
                <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&q=80&w=800" alt="Beauty Flatlay" loading="lazy">
                <div class="item-overlay"><button class="save-btn">儲存</button></div>
            </div>
            <div class="grid-item" data-category="landing-pages">
                <img src="https://images.unsplash.com/photo-1556656793-062ff9878258?auto=format&fit=crop&q=80&w=800" alt="Smartphone Branding" loading="lazy">
                <div class="item-overlay"><button class="save-btn">儲存</button></div>
            </div>
            <div class="grid-item" data-category="branding">
                <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&q=80&w=800" alt="Abstract Branding" loading="lazy">
                <div class="item-overlay"><button class="save-btn">儲存</button></div>
            </div>
        </div>
    </main>

    <!-- Modal Lightbox -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-card">
            <div class="lightbox-img-container">
                <img id="lightbox-img" src="" alt="">
            </div>
            <div class="lightbox-info">
                <button class="save-btn large">儲存作品</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
