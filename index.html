<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra | AI 電商行銷設計師作品集</title>
    <meta name="description" content="AI 驅動的電商品牌視覺與行銷設計提案展示系統">
    
    <!-- Google Fonts: Inter and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="pinterest-theme">
    <!-- Pinterest Style Header -->
    <header class="pin-header">
        <div class="logo-group">
            <div class="logo">U</div>
            <nav class="main-nav">
                <a href="#" class="active">首頁</a>
                <a href="#">聯絡我們</a>
            </nav>
        </div>
        
        <div class="search-container">
            <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" placeholder="搜尋行銷素材、頁面設計、品牌概念..." id="search-input">
        </div>
        
        <div class="icon-group">
            <span class="material-symbols-outlined">notifications</span>
            <span class="material-symbols-outlined">chat</span>
            <div class="profile-avatar">M</div>
            <span class="material-symbols-outlined">expand_more</span>
        </div>
    </header>

    <!-- Sub-navigation / Tags -->
    <div class="sub-nav">
        <div class="tags-container">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="ad-creatives">廣告素材</button>
            <button class="filter-btn" data-filter="marketing-visuals">行銷視覺</button>
            <button class="filter-btn" data-filter="landing-pages">網頁設計</button>
            <button class="filter-btn" data-filter="branding">品牌概念</button>
            <button class="filter-btn" data-filter="social-media">社群行銷</button>
        </div>
    </div>

    <!-- Main Grid -->
    <main class="main-content">
        <div id="masonry-grid" class="masonry-grid">
            <!-- Loading state -->
            <div class="loading-state">載入作品中...</div>
        </div>
    </main>

    <!-- Modal Lightbox -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-card">
            <div class="lightbox-img-container">
                <img id="lightbox-img" src="" alt="">
            </div>
            <div class="lightbox-info">
                 <div class="info-header">
                    <h3 id="lightbox-title">作品標題</h3>
                    <p id="lightbox-category">分類</p>
                </div>
                <button class="save-btn large">儲存作品集</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
