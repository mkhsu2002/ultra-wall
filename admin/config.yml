backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "assets"

collections:
  - name: "works"
    label: "作品管理"
    folder: "data"
    create: true
    slug: "{{id}}"
    extension: "json"
    format: "json"
    file: "data/works.json"
    fields:
      - label: "作品列表"
        name: "works"
        widget: "list"
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "作品標題", name: "title", widget: "string" }
          - { label: "日期", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
          - { label: "分類", name: "category", widget: "select", options: [
              { label: "廣告素材", value: "ad-creatives" },
              { label: "行銷視覺", value: "marketing-visuals" },
              { label: "網頁設計", value: "landing-pages" },
              { label: "品牌概念", value: "branding" },
              { label: "社群行銷", value: "social-media" }
            ]}
          - { label: "作品圖片", name: "image", widget: "image" }
